    <text x="50" y="40" font-size="12" fill="#e82127" font-weight="700" letter-spacing="2" text-anchor="middle">RELEASES</text>
    <text x="50" y="88" font-size="44" fill="#ffffff" font-weight="800" text-anchor="middle">28</text>
