<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="55%" stop-color="#1a0608"/>
      <stop offset="100%" stop-color="#2a0a0d"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e82127" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e82127" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e82127" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e82127" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e82127" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dot1" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg1)"/>
  <rect width="800" height="450" fill="url(#dot1)"/>
  <ellipse cx="640" cy="120" rx="220" ry="160" fill="url(#spot)"/>
  <g stroke="#e82127" stroke-width="1" fill="none" opacity="0.18">
