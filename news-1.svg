    <text x="60" y="248" font-size="62" font-weight="300" letter-spacing="-1" font-style="italic">one rhythm.</text>
  </g>
  <rect x="60" y="282" width="360" height="2" fill="url(#redGlow)"/>
  <g font-family="Helvetica, Arial, sans-serif" fill="#ffffff" font-size="13" font-weight="600">
    <g transform="translate(60,310)">
      <rect width="118" height="32" rx="16" fill="none" stroke="#e82127" stroke-width="1.2"/>
      <circle cx="16" cy="16" r="4" fill="#e82127"/>
      <text x="30" y="21">TrailTrace</text>
    </g>
    <g transform="translate(186,310)">
      <rect width="124" height="32" rx="16" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
      <circle cx="16" cy="16" r="4" fill="#ffffff"/>
      <text x="30" y="21">CurioVault</text>
    </g>
    <g transform="translate(318,310)">
      <rect width="124" height="32" rx="16" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
      <circle cx="16" cy="16" r="4" fill="#ffffff"/>
      <text x="30" y="21">MuseCatch</text>
    </g>
    <g transform="translate(450,310)">
      <rect width="100" height="32" rx="16" fill="#e82127"/>
      <circle cx="16" cy="16" r="4" fill="#ffffff"/>
